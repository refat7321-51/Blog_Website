{% extends 'blog/base.html' %}
{% block title %}Delete Post — DjangoBlog{% endblock %}

{% block content %}
<div class="delete-card">
  <div class="delete-icon">🗑️</div>
  <h2 style="font-size:1.5rem;font-weight:800;margin-bottom:0.5rem;color:var(--text-main);">Delete Post?</h2>
  <p style="color:var(--text-muted);margin-bottom:0.25rem;">You are about to delete:</p>
  <p style="font-weight:700;font-size:1rem;color:var(--danger);">"{{ post.title }}"</p>
  <p style="color:var(--text-muted);font-size:0.88rem;margin-top:0.5rem;">This action cannot be undone. All comments and likes will also be deleted.</p>

  <div class="delete-actions">
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger btn-lg">Yes, Delete</button>
    </form>
    <a href="{% url 'post_detail' post.pk %}" class="btn btn-light btn-lg">Cancel</a>
  </div>
</div>
{% endblock %}
